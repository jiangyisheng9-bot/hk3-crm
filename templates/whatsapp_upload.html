{% extends "base.html" %}
{% block title %}上传 WhatsApp 聊天 — {{ customer.name }}{% endblock %}
{% block content %}
<div class="max-w-3xl mx-auto">
    <div class="flex items-center justify-between mb-6">
        <div>
            <h1 class="text-2xl font-bold text-gray-800">📤 上传 WhatsApp 聊天记录</h1>
            <p class="text-gray-500 mt-1">客户：<strong>{{ customer.name }}</strong></p>
        </div>
        <a href="/customers/{{ customer.id }}" class="text-gray-500 hover:text-gray-700">← 返回客户资料</a>
    </div>

    <form method="POST" class="bg-white rounded-xl shadow-sm p-6 border border-gray-100 space-y-4">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">
                粘贴 WhatsApp 聊天记录
                <span class="text-gray-400 font-normal">（复制整段对话粘贴到下面）</span>
            </label>
            <textarea name="whatsapp_content" rows="20" 
                      class="w-full px-4 py-3 border rounded-lg font-mono text-sm leading-relaxed"
                      placeholder="2026-05-06 14:30 - 客户：你好，我想再买竹盐咖啡
2026-05-06 14:32 - 客服：好的，上次的喝完了吗？
2026-05-06 14:33 - 客户：嗯，效果不错，想再order两盒
..."></textarea>
        </div>
        <div class="flex justify-end space-x-3">
            <a href="/customers/{{ customer.id }}" class="px-6 py-2 border border-gray-300 rounded-lg hover:bg-gray-50">取消</a>
            <button type="submit" class="bg-hk3-600 text-white px-6 py-2 rounded-lg hover:bg-hk3-700 font-medium">📤 上传并分析</button>
        </div>
    </form>

    <div class="mt-4 bg-gray-50 rounded-lg p-4 border border-gray-200">
        <h3 class="text-sm font-medium text-gray-700 mb-2">📋 上传后会自动：</h3>
        <ul class="text-xs text-gray-500 space-y-1">
            <li>✅ 保存聊天记录到客户互动历史</li>
            <li>✅ 在客户详情页显示"AI 分析"入口</li>
            <li>✅ 可用于 AI 生成跟进建议</li>
        </ul>
    </div>
</div>
{% endblock %}
