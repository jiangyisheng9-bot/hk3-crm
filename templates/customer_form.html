{% extends "base.html" %}
{% block title %}{% if customer %}编辑客户{% else %}新增客户{% endif %}{% endblock %}
{% block content %}
<div class="max-w-3xl mx-auto">
    <h1 class="text-2xl font-bold text-gray-800 mb-6">{% if customer %}✏️ 编辑客户{% else %}➕ 新增客户{% endif %}</h1>
    <form method="POST" class="bg-white rounded-xl shadow-sm p-6 border border-gray-100 space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">姓名 *</label>
                <input type="text" name="name" value="{{ customer.name if customer else '' }}" required
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-hk3-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">称呼</label>
                <input type="text" name="nickname" value="{{ customer.nickname if customer else '' }}"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">WhatsApp</label>
                <input type="text" name="phone_whatsapp" value="{{ customer.phone_whatsapp if customer else '' }}" placeholder="+60xxxxxxxxx"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">其他电话</label>
                <input type="text" name="phone_other" value="{{ customer.phone_other if customer else '' }}"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">邮箱</label>
                <input type="email" name="email" value="{{ customer.email if customer else '' }}"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">性别</label>
                <select name="gender" class="w-full px-3 py-2 border border-gray-300 rounded-lg">
                    <option value="">保密</option>
                    <option value="M" {% if customer and customer.gender == 'M' %}selected{% endif %}>男</option>
                    <option value="F" {% if customer and customer.gender == 'F' %}selected{% endif %}>女</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">州</label>
                <input type="text" name="location_state" value="{{ customer.location_state if customer else '' }}" placeholder="柔佛 / 吉隆坡 / ..."
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">城市</label>
                <input type="text" name="location_city" value="{{ customer.location_city if customer else '' }}"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg">
            </div>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">收货地址</label>
            <textarea name="shipping_address" rows="2" class="w-full px-3 py-2 border border-gray-300 rounded-lg">{{ customer.shipping_address if customer else '' }}</textarea>
        </div>

        <hr class="border-gray-200">

        <h3 class="font-semibold text-gray-800">🎯 漏斗 + 客户分层</h3>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">漏斗阶段</label>
                <select name="funnel_stage" class="w-full px-3 py-2 border border-gray-300 rounded-lg">
                    {% for s in stages %}
                    <option value="{{ s }}" {% if customer and customer.funnel_stage == s %}selected{% elif s == '认知' and not customer %}selected{% endif %}>{{ s }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">来源渠道</label>
                <input type="text" name="acquisition_source" value="{{ customer.acquisition_source if customer else '' }}" placeholder="FB广告 / 转介绍 / 线下"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg">
            </div>
        </div>

        <hr class="border-gray-200">

        <h3 class="font-semibold text-gray-800">🏥 健康信息（核心字段）</h3>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">健康问题</label>
                <input type="text" name="health_concerns" value="{{ customer.health_concerns if customer else '' }}" placeholder="糖尿病 / 肾脏 / 痛风 / 高血压"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">服药情况</label>
                <input type="text" name="medication_taking" value="{{ customer.medication_taking if customer else '' }}"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">糖尿病类型</label>
                <input type="text" name="diabetes_type" value="{{ customer.diabetes_type if customer else '' }}" placeholder="1型 / 2型 / 前期"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">过敏</label>
                <input type="text" name="allergies" value="{{ customer.allergies if customer else '' }}"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg">
            </div>
        </div>

        <hr class="border-gray-200">

        <h3 class="font-semibold text-gray-800">📦 偏好</h3>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">物流偏好</label>
                <input type="text" name="preferred_courier" value="{{ customer.preferred_courier if customer else '' }}" placeholder="JNT / Pos Laju / CityLink"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">付款方式偏好</label>
                <input type="text" name="preferred_payment" value="{{ customer.preferred_payment if customer else '' }}" placeholder="DuitNow / 转账 / COD"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg">
            </div>
            <div class="flex items-center pt-6">
                <label class="flex items-center space-x-2">
                    <input type="checkbox" name="do_not_call" {% if customer and customer.do_not_call %}checked{% endif %}
                           class="rounded border-gray-300 text-hk3-600 focus:ring-hk3-500">
                    <span class="text-sm text-gray-600">拒绝电话联系</span>
                </label>
            </div>
        </div>

        <hr class="border-gray-200">

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">备注</label>
            <textarea name="notes" rows="3" class="w-full px-3 py-2 border border-gray-300 rounded-lg">{{ customer.notes if customer else '' }}</textarea>
        </div>

        <div class="flex justify-end space-x-3">
            <a href="{% if customer %}/customers/{{ customer.id }}{% else %}/customers{% endif %}"
               class="px-6 py-2 border border-gray-300 rounded-lg hover:bg-gray-50 transition">取消</a>
            <button type="submit" class="bg-hk3-600 text-white px-6 py-2 rounded-lg hover:bg-hk3-700 transition font-medium">
                {% if customer %}💾 保存修改{% else %}✅ 添加客户{% endif %}
            </button>
        </div>
    </form>
</div>
{% endblock %}
