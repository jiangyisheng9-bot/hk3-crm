<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK3 CRM — {% block title %}Dashboard{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        hk3: { 50: '#f0fdf4', 100: '#dcfce7', 500: '#22c55e', 600: '#16a34a', 700: '#15803d', 800: '#166534', 900: '#14532d' }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-hk3-800 text-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center space-x-8">
                    <a href="/" class="text-xl font-bold flex items-center space-x-2">
                        <span>🌿</span>
                        <span>HK3 CRM</span>
                    </a>
                    <div class="hidden md:flex space-x-4">
                        <a href="/" class="px-3 py-2 rounded-lg hover:bg-hk3-700 transition">📊 Dashboard</a>
                        <a href="/customers" class="px-3 py-2 rounded-lg hover:bg-hk3-700 transition">👥 客户</a>
                        <a href="/orders" class="px-3 py-2 rounded-lg hover:bg-hk3-700 transition">📦 订单</a>
                        <a href="/repurchases" class="px-3 py-2 rounded-lg hover:bg-hk3-700 transition">🔄 复购</a>
                        <a href="/followups" class="px-3 py-2 rounded-lg hover:bg-hk3-700 transition">📋 跟进</a>
                        <a href="/system/update" class="px-3 py-2 rounded-lg hover:bg-hk3-700 transition text-xs">🔄</a>
                    </div>
                    <a href="/settings" class="px-3 py-2 rounded-lg hover:bg-hk3-700 transition text-sm">⚙️</a>
                </div>
                <div class="flex items-center space-x-2 text-sm text-green-200">
                    <span>⏰ <span id="clock"></span></span>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-6">
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="mb-4 p-4 rounded-lg {% if category == 'success' %}bg-green-100 text-green-800 border border-green-200{% else %}bg-red-100 text-red-800 border border-red-200{% endif %}">
            {{ message }}
        </div>
        {% endfor %}
        {% endif %}
        {% endwith %}
        {% block content %}{% endblock %}
    </main>

    <script>
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = 
                now.toLocaleString('zh-CN', { timeZone: 'Asia/Kuala_Lumpur', hour12: false });
        }
        updateClock();
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
